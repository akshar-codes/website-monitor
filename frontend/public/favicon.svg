<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern Tech Gradients -->
    <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    
    <!-- Neon Glow Filter (Adjusted for small scales) -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Mode Squircle Background -->
  <rect width="128" height="128" rx="28" fill="#0B1120"/>

  <!-- Outer Ring (Thickened for visibility) -->
  <circle cx="64" cy="64" r="46" fill="#0F172A" stroke="#1E293B" stroke-width="4" />
  <circle cx="64" cy="64" r="46" stroke="url(#pulseGradient)" stroke-width="4" stroke-dasharray="144 144" stroke-linecap="round" filter="url(#neonGlow)" />

  <!-- Thick Central Glowing Pulse -->
  <path d="M18 64 L40 64 L52 32 L76 96 L88 64 L110 64" stroke="url(#pulseGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)" />
  
  <!-- Bright Tracking Nodes -->
  <circle cx="52" cy="32" r="5" fill="#FFFFFF" />
  <circle cx="76" cy="96" r="5" fill="#FFFFFF" />
</svg>
